apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-diagram-mcp
spec:
  template:
    spec:
      containers:
        - name: gemini-diagram-mcp
          # Update this tag after pushing the image that contains the Vertex AI changes.
          image: registry.arunlabs.com/gemini-diagram-mcp@sha256:933520bdcaeb18851b89d177f83986286fd496a02c8935e4dbd7e3e45f1672ff
          env:
            - name: MCP_AUTH_MODE
              value: none
            - name: MCP_AUTH_TOKEN
              $patch: delete
            - name: PUBLIC_BASE_URL
              value: https://diagram.arunlabs.com
