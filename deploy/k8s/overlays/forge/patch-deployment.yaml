apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-diagram-mcp
spec:
  template:
    spec:
      containers:
        - name: gemini-diagram-mcp
          # Update this tag after pushing the image that contains the Vertex AI changes.
          image: registry.arunlabs.com/gemini-diagram-mcp@sha256:a5088e2b3715768851c57011aa93e3105a3e52f7f18f8ab3660d262bf2e852a9
          env:
            - name: MCP_AUTH_MODE
              value: none
            - name: MCP_AUTH_TOKEN
              $patch: delete
            - name: PUBLIC_BASE_URL
              value: https://diagram.arunlabs.com
