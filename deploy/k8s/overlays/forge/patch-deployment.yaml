apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-diagram-mcp
spec:
  template:
    spec:
      containers:
        - name: gemini-diagram-mcp
          # Update this tag after pushing the image that contains the Vertex AI changes.
          image: registry.arunlabs.com/gemini-diagram-mcp@sha256:e28c1e151fec6cca424cb0bf4a0316e1dee5e10a65448adf0d39ef5b09522d90
          env:
            - name: MCP_AUTH_MODE
              value: none
            - name: MCP_AUTH_TOKEN
              $patch: delete
            - name: PUBLIC_BASE_URL
              value: https://diagram.arunlabs.com
