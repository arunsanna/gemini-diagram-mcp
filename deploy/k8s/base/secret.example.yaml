apiVersion: v1
kind: Secret
metadata:
  name: gemini-diagram-mcp-secrets
type: Opaque
stringData:
  # Vertex AI API key placeholder. Replace manually before real traffic.
  VERTEX_AI_API_KEY: "REPLACE_WITH_VERTEX_AI_API_KEY"

  # Static token auth (only used when MCP_AUTH_MODE=token)
  MCP_AUTH_TOKEN: "REPLACE_WITH_STRONG_BEARER_TOKEN"
