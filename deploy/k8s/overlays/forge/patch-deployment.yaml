apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-diagram-mcp
spec:
  template:
    spec:
      containers:
        - name: gemini-diagram-mcp
          # Update this tag after pushing the image that contains the Vertex AI changes.
          image: registry.arunlabs.com/gemini-diagram-mcp@sha256:4c1b99d1ebc61d0e859fde9573ceecd95079e8ea3a50eb45e2cad22cb9c6a61a
          env:
            - name: MCP_AUTH_MODE
              value: none
            - name: MCP_AUTH_TOKEN
              $patch: delete
            - name: PUBLIC_BASE_URL
              value: https://diagram.arunlabs.com
