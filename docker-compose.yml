services:
  gemini-diagram-mcp:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Required: Vertex AI API key
      - VERTEX_AI_API_KEY=${VERTEX_AI_API_KEY}
      - GOOGLE_GENAI_USE_VERTEXAI=true
      - VERTEX_AI_IMAGE_MODEL=${VERTEX_AI_IMAGE_MODEL:-gemini-3-pro-image-preview}

      # Auth (choose one)
      - MCP_AUTH_MODE=${MCP_AUTH_MODE:-token}
      # Static token mode
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_AUTH_TOKENS=${MCP_AUTH_TOKENS}
      # OIDC JWT mode
      - OIDC_ISSUER=${OIDC_ISSUER}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - OIDC_JWKS_URI=${OIDC_JWKS_URI}
      # Allow ?token=... auth (disabled by default in oidc mode)
      - MCP_ALLOW_QUERY_TOKEN=${MCP_ALLOW_QUERY_TOKEN}

      # Storage (bind-mounted below)
      - OUTPUT_DIR=/data/out

      # Used for generating download links in tool responses
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:3000}

      # Optional
      - HOST=0.0.0.0
      - PORT=3000
      - INLINE_IMAGES=${INLINE_IMAGES:-0}
    volumes:
      - ./data:/data
